<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Elysean Perfumes - Checkout</title>
    <link rel='stylesheet' href='/css/bootstrap.min.css'>
    <link rel='stylesheet' href='/css/yoco-payment.css'>
</head>
<body>
    <div class='checkout-card'>
        <h2>Elysean Perfumes</h2>
        <p style='color:#666;'>Complete your purchase securely with Yoco</p>
        <div style='border-top:1px solid #eee; padding-top:16px; margin-top:16px;'>
            <div style='display:flex; justify-content:space-between; margin-bottom:8px;'>
                <span>Perfume Order</span>
                <span>R100.00</span>
            </div>
        </div>
        <div style='border-top:1px solid #eee; padding-top:12px; margin-top:12px;'>
            <div style='display:flex; justify-content:space-between; font-weight:bold;'>
                <span>Total</span>
                <span>R100.00</span>
            </div>
        </div>
        <button class='pay-btn' id='pay-btn' onclick='startCheckout()'>
            Pay R100.00 with Yoco
        </button>
        <p id='error-msg' style='color:red; margin-top:12px; display:none;'></p>
    </div>
        <script src='/js/yoco-payment.js'></script>
</body>
</html>
